kind = "web"
previewPath = "/"
title = "Coffee World"
version = "1.0.0"
id = "artifacts/coffee-world"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22300

[services.development]
run = "pnpm --filter @workspace/coffee-world run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/coffee-world", "run", "build" ]
publicDir = "artifacts/coffee-world/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22300"
BASE_PATH = "/"
